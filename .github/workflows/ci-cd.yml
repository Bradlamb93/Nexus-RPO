name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: first-choice-connect
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────
  # Build & Test
  # ─────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────
  # Docker Build
  # ─────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container starts and is healthy
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:test .
          docker run -d --name test-container -p 8080:8080 ${{ env.IMAGE_NAME }}:test
          sleep 5
          curl -f http://localhost:8080/health.json || exit 1
          curl -f http://localhost:8080/ || exit 1
          docker stop test-container

  # ─────────────────────────────────────────
  # Deploy (on main branch push only)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Registry Login (uncomment and configure for your registry) ──
      # - name: Login to Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ${{ secrets.REGISTRY_URL }}
      #     username: ${{ secrets.REGISTRY_USERNAME }}
      #     password: ${{ secrets.REGISTRY_PASSWORD }}

      # ── Build and Push ──
      # - name: Build and push Docker image
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     push: true
      #     tags: |
      #       ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest
      #       ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy placeholder
        run: |
          echo "✅ Build validated and ready for deployment"
          echo "📦 Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo ""
          echo "To enable deployment, uncomment the registry login and push steps above,"
          echo "then configure the following repository secrets:"
          echo "  - REGISTRY_URL"
          echo "  - REGISTRY_USERNAME"
          echo "  - REGISTRY_PASSWORD"
