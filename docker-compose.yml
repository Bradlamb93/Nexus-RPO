version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_TITLE: "${VITE_APP_TITLE:-First Choice Connect}"
        VITE_API_URL: "${VITE_API_URL:-}"
    container_name: first-choice-connect
    ports:
      - "${PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - NODE_ENV=production
    labels:
      - "com.firstchoiceconnect.description=Healthcare Workforce Management Platform"
      - "com.firstchoiceconnect.version=1.0.0"
