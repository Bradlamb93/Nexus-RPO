version: "3.9"

services:
  # ─── PostgreSQL Database ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fcc-db
    environment:
      POSTGRES_DB: ${DB_NAME:-nexus_rpo}
      POSTGRES_USER: ${DB_USER:-nexus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexus_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexus} -d ${DB_NAME:-nexus_rpo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Application Server ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_TITLE: "${VITE_APP_TITLE:-First Choice Connect}"
        VITE_API_URL: "/api"
    container_name: fcc-app
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-nexus_rpo}
      - DB_USER=${DB_USER:-nexus}
      - DB_PASSWORD=${DB_PASSWORD:-nexus_dev}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    labels:
      - "com.firstchoiceconnect.description=Healthcare Workforce Management Platform"
      - "com.firstchoiceconnect.version=1.0.0"

volumes:
  pgdata:
    driver: local
